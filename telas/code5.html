<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Expense Modal</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-dark": "#192633",
              "input-dark": "#233345",
              "border-dark": "#324d67",
              "text-secondary": "#92adc9"
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        /* Custom scrollbar for better integration in dark mode */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101922; 
        }
        ::-webkit-scrollbar-thumb {
            background: #324d67; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a6b8c; 
        }

        /* Toggle Switch Checkbox Styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #137fec;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #137fec;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Overlay Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-[600px] flex flex-col bg-surface-dark rounded-xl shadow-2xl border border-border-dark overflow-hidden max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-border-dark bg-surface-dark">
<h2 class="text-white text-xl font-bold tracking-tight">Add New Expense</h2>
<button class="text-text-secondary hover:text-white transition-colors p-1 rounded-lg hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Amount Input -->
<div class="flex flex-col gap-2">
<label class="text-text-secondary text-sm font-medium" for="amount">Amount</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-white font-semibold text-xl pointer-events-none">R$</span>
<input class="w-full bg-input-dark border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white text-2xl font-bold placeholder:text-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="amount" placeholder="0,00" type="text"/>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-text-secondary text-sm font-medium" for="description">Description</label>
<div class="relative">
<input class="w-full bg-input-dark border border-border-dark rounded-lg h-12 px-4 text-white text-base placeholder:text-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="description" placeholder="e.g. Weekly Groceries" type="text"/>
</div>
</div>
<!-- Date & Payment Method Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-text-secondary text-sm font-medium" for="date">Date</label>
<div class="relative">
<input class="w-full bg-input-dark border border-border-dark rounded-lg h-12 px-4 text-white text-base focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all [color-scheme:dark]" id="date" type="date" value="2023-10-27"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-text-secondary text-sm font-medium" for="payment">Payment Method</label>
<div class="relative">
<select class="w-full bg-input-dark border border-border-dark rounded-lg h-12 px-4 text-white text-base focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all appearance-none cursor-pointer" id="payment">
<option value="credit">Credit Card</option>
<option value="debit">Debit Card</option>
<option value="pix">Pix</option>
<option value="cash">Cash</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none text-xl">expand_more</span>
</div>
</div>
</div>
<!-- Category -->
<div class="flex flex-col gap-2">
<label class="text-text-secondary text-sm font-medium" for="category">Category</label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-red-500 pointer-events-none"></div>
<select class="w-full bg-input-dark border border-border-dark rounded-lg h-12 pl-10 pr-4 text-white text-base focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all appearance-none cursor-pointer" id="category">
<option value="food">Food &amp; Dining</option>
<option value="housing">Housing</option>
<option value="transport">Transportation</option>
<option value="leisure">Leisure</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none text-xl">expand_more</span>
</div>
</div>
<!-- Divider -->
<div class="h-px bg-border-dark w-full my-2"></div>
<!-- Shared Expense Toggle -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-white text-base font-semibold">Shared Expense?</span>
<span class="text-text-secondary text-sm">Split this cost with family members</span>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-dark appearance-none cursor-pointer transition-all duration-300 left-0 checked:left-[50%] z-10" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-input-dark border border-border-dark cursor-pointer transition-colors duration-300" for="toggle"></label>
</div>
</div>
<!-- Hidden/Shown Logic (Simulated with visible state for design) -->
<div class="bg-input-dark/50 rounded-lg p-4 border border-border-dark/50 mt-1">
<label class="text-text-secondary text-sm font-medium mb-3 block">Split with:</label>
<div class="flex flex-wrap gap-2">
<!-- User 1: Active -->
<button class="flex items-center gap-2 bg-primary/20 hover:bg-primary/30 border border-primary/50 rounded-full pl-1 pr-3 py-1 transition-all group">
<img alt="Alice Avatar" class="w-6 h-6 rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCk_KR18iAsvSFlrMa2JxWj6EXMjgu46PpGpYbLMl4wToou_dx0aKhy4kjmMj7hJFZZl5bA3SjhWG6O9_8WZARw0WmbdPgKdvnSBhYJsEzt1HLnFIBGlTjYwPOTp-qMbt87oTrq76CjxU1WjtdLJa4Sv1OMfPW4GUdwtqx6JETvlUX9sbSTP_PrSyjRiip0VbWn8XJWl2ZtdIV76OqdLYcVj-h0uJS-DYMutgHJ4jS3R6i5lgkwup8SacwrvHRxO96g2Hc3U-CKkXo"/>
<span class="text-primary text-sm font-medium">Alice</span>
<span class="material-symbols-outlined text-sm text-primary">check</span>
</button>
<!-- User 2: Inactive -->
<button class="flex items-center gap-2 bg-surface-dark hover:bg-input-dark border border-border-dark rounded-full pl-1 pr-3 py-1 transition-all">
<img alt="Bob Avatar" class="w-6 h-6 rounded-full object-cover grayscale opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDZLdHboVdapEGOjVlKzIUzTSWzqzl44XbUaJJXspgk6rSo4c6vKWRONw51P9-5ezlrunka3v7u9HSSa1JoKpvzbyfzMRcMrlLdzOWQnk1oZaXcnWLphDt0jLA6bnrjS7I5SBKx-NHGWPsG1MVPqdrMrlu5dwupxgEK48KTxQhpfz_kM0V1nuu2Pi0K5kGO8A7i18jxxPqy8eV1q7-8RQrBstvDXzZxWNmMWrg9RTcWgl4jHBdUe97m2gLw-Yx58gcqikWaxAgLO0"/>
<span class="text-text-secondary text-sm font-medium">Bob</span>
</button>
<!-- User 3: Inactive -->
<button class="flex items-center gap-2 bg-surface-dark hover:bg-input-dark border border-border-dark rounded-full pl-1 pr-3 py-1 transition-all">
<img alt="Charlie Avatar" class="w-6 h-6 rounded-full object-cover grayscale opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLZPoAgDeyKfERCDbmTi3jUYX-u8QkTLY3pfrXIVYankYiMtsA42ECP7ga5E87K8pUKlAHmn2EzMEPhQF7Xo6b771-OHiwWtOiwBkGgMsAWBhvfA7yg-A6XkkI4w5W18CEm33bpb2OcA4eFbKXmqSTlJ08i6b0bF1jxGwjZbYQTvRA0oDEnyT0FiXzLz0zOjv7esjf4m8ma2K86x1dOSYenzhi6nZKXWekhAjtaFDfnWUWIeNq-d7JbZnpPaWtXwHHtI01KO-atKI"/>
<span class="text-text-secondary text-sm font-medium">Charlie</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-5 border-t border-border-dark bg-surface-dark flex justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg text-white font-medium hover:bg-white/5 transition-colors border border-transparent hover:border-border-dark focus:outline-none focus:ring-2 focus:ring-white/20">
                Cancel
            </button>
<button class="px-6 py-2.5 rounded-lg bg-primary hover:bg-blue-600 text-white font-semibold shadow-lg shadow-blue-900/20 transition-all transform hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface-dark">
                Save Expense
            </button>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pay Bill Confirmation Modal</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101922; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2b3b4d; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3e5165; 
        }
        
        /* Select Chevron Override */
        select {
             background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239CA3AF' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
             background-position: right 0.5rem center;
             background-repeat: no-repeat;
             background-size: 1.5em 1.5em;
             padding-right: 2.5rem;
             -webkit-print-color-adjust: exact;
             print-color-adjust: exact;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop / Container -->
<!-- Simulating the modal being open on top of the main app -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#0d1319]/80 backdrop-blur-sm p-4 animate-in fade-in duration-200">
<!-- Modal Card -->
<div class="relative w-full max-w-[600px] bg-[#111a22] rounded-xl shadow-2xl border border-[#232f3e] overflow-hidden flex flex-col max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-[#232f3e] bg-[#141f2a]">
<h3 class="text-white text-xl font-bold leading-tight tracking-[-0.015em]">Pay Bill</h3>
<button class="text-[#92adc9] hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto">
<div class="p-6 space-y-8">
<!-- Bill Summary Card -->
<div class="bg-gradient-to-br from-[#1a2633] to-[#141d27] rounded-xl p-5 border border-[#232f3e] shadow-sm relative overflow-hidden group">
<!-- Decorative glow -->
<div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl group-hover:bg-primary/20 transition-all duration-500"></div>
<div class="flex flex-col sm:flex-row gap-5 relative z-10">
<!-- Vendor Logo / Icon -->
<div class="flex-shrink-0">
<div class="bg-center bg-no-repeat bg-cover rounded-lg h-20 w-20 shadow-inner border border-[#232f3e]" data-alt="Comcast logo on dark background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBukdFq0swZs4mxFWH-M_UAZy-xJULn05KYD-OEpGzp16orp4ebwMepLizNEEFGYwsK64pe9lyqsnbTJM-Od4uvq_wI5gYJon4ziBASVAGNtBlSXLLm8GxWetv_I5OmyB37lDevTts8gSY_oY7jUAwjfatEZWe1-3Nbf3-_2iwzdBlm-hNc4ZACGJyQydyUp7iYLVzVVewahwCHDwad7T3CWN0fGhiCNVEy3s8kLLdEcX6xfh5y4bmEBinA11B4RhFNTXiMBbUCiuw");'>
</div>
</div>
<!-- Bill Details -->
<div class="flex flex-col flex-1 justify-center">
<div class="flex justify-between items-start">
<div>
<p class="text-white text-lg font-bold leading-tight tracking-tight">Comcast Internet</p>
<p class="text-[#92adc9] text-sm font-medium mt-1">Utility &amp; Services</p>
</div>
<div class="text-right">
<p class="text-white text-2xl font-bold leading-tight tracking-tight">$89.99</p>
<div class="inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded bg-red-500/10 border border-red-500/20">
<span class="material-symbols-outlined text-red-400 text-[14px]">warning</span>
<span class="text-red-400 text-xs font-bold uppercase tracking-wide">Due Oct 24</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Payment Method -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-semibold leading-normal flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]">credit_card</span>
                                Payment Method
                            </label>
<div class="relative">
<select class="appearance-none w-full bg-[#192633] hover:bg-[#1e2d3d] border border-[#324d67] focus:border-primary focus:ring-1 focus:ring-primary text-white rounded-lg h-12 px-4 transition-all outline-none cursor-pointer">
<option disabled="" selected="" value="">Select a method</option>
<option value="chase_sapphire">Chase Sapphire (...4021)</option>
<option value="checking">Checking Account (...8832)</option>
<option value="apple_pay">Apple Pay</option>
</select>
</div>
</div>
<!-- Date & Reference Row -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Payment Date -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-semibold leading-normal flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]">calendar_today</span>
                                    Payment Date
                                </label>
<input class="w-full bg-[#192633] hover:bg-[#1e2d3d] border border-[#324d67] focus:border-primary focus:ring-1 focus:ring-primary text-white rounded-lg h-12 px-4 transition-all outline-none [color-scheme:dark]" type="date" value="2023-10-24"/>
</div>
<!-- Reference -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-semibold leading-normal flex items-center gap-2">
<span class="material-symbols-outlined text-[#92adc9] text-[18px]">description</span>
                                    Reference Note <span class="text-[#58738e] font-normal">(Optional)</span>
</label>
<input class="w-full bg-[#192633] hover:bg-[#1e2d3d] border border-[#324d67] focus:border-primary focus:ring-1 focus:ring-primary text-white rounded-lg h-12 px-4 transition-all outline-none placeholder:text-[#58738e]" placeholder="#CHK-10293" type="text"/>
</div>
</div>
<!-- Quick Category Tag (Optional Context) -->
<div class="pt-2">
<div class="flex items-center gap-3 p-3 bg-[#192633]/50 rounded-lg border border-dashed border-[#324d67]">
<div class="bg-primary/20 p-2 rounded-full h-8 w-8 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm">savings</span>
</div>
<div class="flex flex-col">
<span class="text-xs text-[#92adc9]">Budget Impact</span>
<span class="text-xs text-white">This payment is within your <span class="text-primary font-medium">Utilities</span> budget for October.</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 border-t border-[#232f3e] bg-[#141f2a] flex flex-col-reverse sm:flex-row gap-3 sm:justify-end">
<button class="flex items-center justify-center h-12 px-6 rounded-lg border border-[#324d67] bg-transparent text-[#92adc9] hover:text-white hover:border-[#4b6a8a] hover:bg-[#1f2b38] transition-all font-medium text-sm">
                    Cancel
                </button>
<button class="flex items-center justify-center h-12 px-6 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold text-sm shadow-lg shadow-primary/20 transition-all transform active:scale-95 group">
<span class="mr-2">Confirm Payment</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>
